<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ranking de Jugadores</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:40px;
        }

        h1{
            color:#333;
        }

        .ranking{

            width:600px;
            margin:auto;

            background:white;

            border-radius:10px;

            box-shadow:0 4px 10px rgba(0,0,0,.2);

            overflow:hidden;

        }

        ul{

            list-style:none;

            margin:0;

            padding:0;

        }

        li{

            display:flex;

            justify-content:space-between;

            padding:15px;

            border-bottom:1px solid #ddd;

            font-size:18px;

        }

        .lider{

            background:#fff8dc;

            font-weight:bold;

            color:darkgoldenrod;

        }

    </style>

</head>

<body>

<h1>🏆 Ranking de Jugadores</h1>

<div class="ranking">

<ul>

{% for jugador in jugadores %}

<li>

<span>

{{ jugador.nombre }}

</span>

<span>

{{ jugador.puntaje }} pts

</span>

</li>

{% endfor %}

</ul>

</div>

</body>

</html>
